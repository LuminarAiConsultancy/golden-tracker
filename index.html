/* ---------- Status pill ---------- */
function StatusPill({ tone, label, size = "md" }) {
  const t = TONE[tone] || TONE.neutral;
  const pad = size === "sm" ? "2px 8px 2px 7px" : "3px 10px 3px 9px";
  const fs = size === "sm" ? 11.5 : 12.5;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      background: t.bg, color: t.fg, padding: pad, borderRadius: 999,
      fontSize: fs, fontWeight: 600, letterSpacing: ".01em", whiteSpace: "nowrap",
      fontFamily: "var(--ui)",
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 999, background: t.dot, flex: "0 0 auto" }} />
      {label}
    </span>
  );
}

/* ---------- Department badge ---------- */
function DeptBadge({ id, subtle = false }) {
  const d = deptById(id);
  if (!d) return null;
  const c = `oklch(0.52 0.12 ${d.hue})`;
  const bg = `oklch(0.96 0.03 ${d.hue})`;
  return (
    <span title={d.name} style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      fontFamily: "var(--ui)", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap",
      maxWidth: "100%", minWidth: 0, overflow: "hidden",
      color: subtle ? "var(--muted)" : c,
      background: subtle ? "transparent" : bg,
      padding: subtle ? 0 : "3px 9px", borderRadius: 6,
    }}>
      <span style={{ width: 7, height: 7, borderRadius: 2, background: c, flex: "0 0 auto" }} />
      <span style={{ overflow: "hidden", textOverflow: "ellipsis" }}>{d.name}</span>
    </span>
  );
}

/* ---------- Progress bar ---------- */
function ProgressBar({ value, color = "var(--green)", height = 8, track = "var(--line)" }) {
  return (
    <div style={{ height, background: track, borderRadius: 999, overflow: "hidden", width: "100%" }}>
      <div style={{
        width: `${Math.max(0, Math.min(100, value))}%`, height: "100%",
        background: color, borderRadius: 999, transition: "width .5s cubic-bezier(.4,0,.2,1)",
      }} />
    </div>
  );
}

/* ---------- Segmented control ---------- */
function Segmented({ options, value, onChange }) {
  return (
    <div style={{
      display: "inline-flex", background: "var(--bg-sunk)", border: "1px solid var(--line)",
      borderRadius: 9, padding: 3, gap: 2,
    }}>
      {options.map((o) => {
        const active = o.value === value;
        return (
          <button key={o.value} onClick={() => onChange(o.value)} style={{
            display: "inline-flex", alignItems: "center", gap: 7,
            border: "none", cursor: "pointer", borderRadius: 6,
            padding: "6px 13px", fontFamily: "var(--ui)", fontSize: 13, fontWeight: 600,
            background: active ? "var(--paper)" : "transparent",
            color: active ? "var(--ink)" : "var(--muted)",
            boxShadow: active ? "0 1px 2px rgba(16,38,24,.12)" : "none",
            transition: "all .15s",
          }}>
            {o.icon && <Icon name={o.icon} size={15} />}
            {o.label}
          </button>
        );
      })}
    </div>
  );
}

/* ---------- Chip (filter button) ---------- */
function Chip({ active, onClick, children, dot }) {
  return (
    <button onClick={onClick} style={{
      display: "inline-flex", alignItems: "center", gap: 7,
      padding: "6px 12px", borderRadius: 999, cursor: "pointer",
      fontFamily: "var(--ui)", fontSize: 12.5, fontWeight: 600,
      border: active ? "1px solid var(--green)" : "1px solid var(--line)",
      background: active ? "var(--green-tint)" : "var(--paper)",
      color: active ? "var(--green-dark)" : "var(--muted)",
      transition: "all .15s",
    }}>
      {dot && <span style={{ width: 7, height: 7, borderRadius: 999, background: dot, flex: "0 0 auto" }} />}
      {children}
    </button>
  );
}

/* ---------- Status editor (staff mode) — pill that opens a menu ---------- */
function StatusEditor({ options, value, onChange }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const current = options.find((o) => o.id === value) || options[0];
  React.useEffect(() => {
    if (!open) return;
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [open]);
  const t = TONE[current.tone] || TONE.neutral;
  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block" }}>
      <button onClick={() => setOpen((o) => !o)} style={{
        display: "inline-flex", alignItems: "center", gap: 6, cursor: "pointer",
        background: t.bg, color: t.fg, padding: "3px 8px 3px 9px", borderRadius: 999,
        fontSize: 12.5, fontWeight: 600, fontFamily: "var(--ui)",
        border: "1px dashed " + t.dot,
      }}>
        <span style={{ width: 6, height: 6, borderRadius: 999, background: t.dot }} />
        {current.label}
        <Icon name="chevron" size={13} style={{ opacity: .7 }} />
      </button>
      {open && (
        <div style={{
          position: "absolute", top: "calc(100% + 6px)", left: 0, zIndex: 40,
          background: "var(--paper)", border: "1px solid var(--line)", borderRadius: 10,
          boxShadow: "0 12px 30px rgba(16,38,24,.16)", padding: 5, minWidth: 168,
        }}>
          {options.map((o) => {
            const ot = TONE[o.tone] || TONE.neutral;
            const sel = o.id === value;
            return (
              <button key={o.id} onClick={() => { onChange(o.id); setOpen(false); }} style={{
                display: "flex", alignItems: "center", gap: 9, width: "100%", textAlign: "left",
                border: "none", background: sel ? "var(--bg-sunk)" : "transparent", cursor: "pointer",
                padding: "8px 10px", borderRadius: 7, fontFamily: "var(--ui)", fontSize: 13,
                fontWeight: 600, color: "var(--ink)",
              }}>
                <span style={{ width: 8, height: 8, borderRadius: 999, background: ot.dot, flex: "0 0 auto" }} />
                {o.label}
                {sel && <Icon name="check" size={14} style={{ marginLeft: "auto", color: "var(--green)" }} />}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ---------- Icon button (staff controls) ---------- */
function IconBtn({ icon, title, onClick, tone = "muted", size = 30 }) {
  const colors = {
    muted:  { fg: "var(--muted)", hbg: "var(--bg-sunk)", hfg: "var(--ink)" },
    danger: { fg: "#a13a2c",      hbg: "#fbeae6",         hfg: "#8a2f23" },
    green:  { fg: "var(--green-dark)", hbg: "var(--green-tint)", hfg: "var(--green-dark)" },
  }[tone];
  const [h, setH] = React.useState(false);
  return (
    <button title={title} onClick={(e) => { e.stopPropagation(); onClick(e); }}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{
        width: size, height: size, borderRadius: 8, cursor: "pointer",
        border: "1px solid " + (h ? "var(--line-strong)" : "var(--line)"),
        background: h ? colors.hbg : "var(--paper)", color: h ? colors.hfg : colors.fg,
        display: "grid", placeItems: "center", transition: "all .14s", flex: "0 0 auto",
      }}>
      <Icon name={icon} size={15} />
    </button>
  );
}

/* ---------- Field label + input/select wrappers ---------- */
const fieldInput = {
  width: "100%", boxSizing: "border-box", padding: "8px 11px", borderRadius: 8,
  border: "1px solid var(--line-strong)", background: "var(--paper)",
  fontFamily: "var(--ui)", fontSize: 13.5, color: "var(--ink)", outline: "none",
};
function Field({ label, children }) {
  return (
    <label style={{ display: "flex", flexDirection: "column", gap: 5 }}>
      <span style={{ fontFamily: "var(--ui)", fontSize: 11, fontWeight: 700, letterSpacing: ".05em", textTransform: "uppercase", color: "var(--muted)" }}>{label}</span>
      {children}
    </label>
  );
}

Object.assign(window, {
  cls, deptById, resStatusById, priStatusById, goalById, fmtDate, fmtDateShort, TONE,
  GoldenMark, Icon, StatusPill, DeptBadge, ProgressBar, Segmented, Chip, StatusEditor,
  IconBtn, Field, fieldInput,
});

  </script>
  <script type="text/babel" data-presets="react">
/* Strategic Priorities section: cards-by-goal + roadmap timeline. */

/* G is global */
const PRI_WEIGHT = { complete: 1, inprogress: 0.5, onhold: 0.25, notstarted: 0 };
const YEARS = [2025, 2026, 2027, 2028];

function goalStats(items) {
  const total = items.length;
  let score = 0;
  const counts = { notstarted: 0, inprogress: 0, complete: 0, onhold: 0 };
  items.forEach((p) => { score += PRI_WEIGHT[p.status] ?? 0; counts[p.status]++; });
  return { total, pct: total ? Math.round((score / total) * 100) : 0, counts };
}

/* stacked mini-bar showing status distribution */
function StatusBar({ counts, total }) {
  const order = ["complete", "inprogress", "onhold", "notstarted"];
  return (
    <div style={{ display: "flex", height: 8, borderRadius: 999, overflow: "hidden", background: "var(--line)", width: "100%" }}>
      {order.map((k) => {
        const n = counts[k];
        if (!n) return null;
        const tone = priStatusById(k).tone;
        return <div key={k} title={`${priStatusById(k).label}: ${n}`} style={{ width: `${(n / total) * 100}%`, background: TONE[tone].dot }} />;
      })}
    </div>
  );
}

function TargetTag({ target }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 5, fontFamily: "var(--ui)",
      fontSize: 11.5, fontWeight: 600, color: "var(--muted)", whiteSpace: "nowrap",
    }}>
      <Icon name="calendar" size={13} style={{ opacity: .65 }} />
      Q{target.q} {target.year}
    </span>
  );
}

/* ---------- Inline objective editor (add / edit) ---------- */
const PRI_YEARS = [2025, 2026, 2027, 2028];
function PriorityEditor({ initial, onSave, onCancel, isNew, defaultDept, role, fullAccess }) {
  const [title, setTitle] = React.useState(initial.title || "");
  const [desc, setDesc] = React.useState(initial.desc || "");
  const [dept, setDept] = React.useState(initial.dept || defaultDept || G.DEPARTMENTS[0].id);
  const [status, setStatus] = React.useState(initial.status || "notstarted");
  const [year, setYear] = React.useState((initial.target && initial.target.year) || 2026);
  const [q, setQ] = React.useState((initial.target && initial.target.q) || 1);
  const canSave = title.trim().length > 0;
  const save = () => { if (!canSave) return; onSave({ title: title.trim(), desc: desc.trim(), dept, status, target: { year: Number(year), q: Number(q) } }); };
  const reassigning = !isNew && initial.dept && dept !== initial.dept;
  const losingAccess = reassigning && !fullAccess && dept !== role;
  const selStyle = { ...fieldInput, appearance: "none", cursor: "pointer", paddingRight: 30,
    background: "var(--paper) url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%235d6b73' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>\") no-repeat right 9px center" };
  return (
    <div style={{ background: "var(--paper)", border: "1.5px solid var(--green)", borderRadius: 12, padding: 16, display: "flex", flexDirection: "column", gap: 12, boxShadow: "0 8px 26px rgba(16,38,24,.12)" }}>
      <div style={{ fontFamily: "var(--ui)", fontSize: 12, fontWeight: 700, letterSpacing: ".05em", textTransform: "uppercase", color: "var(--green-dark)" }}>
        {isNew ? "New objective" : "Edit objective"}
      </div>
      <Field label="Title">
        <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="Objective title" style={fieldInput} autoFocus />
      </Field>
      <Field label="Description">
        <textarea value={desc} onChange={(e) => setDesc(e.target.value)} rows={3} placeholder="What this objective involves…" style={{ ...fieldInput, resize: "vertical", lineHeight: 1.5 }} />
      </Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Field label="Responsible department">
          <select value={dept} onChange={(e) => setDept(e.target.value)} style={selStyle}>
            {G.DEPARTMENTS.map((d) => <option key={d.id} value={d.id}>{d.name}</option>)}
          </select>
        </Field>
        <Field label="Status">
          <select value={status} onChange={(e) => setStatus(e.target.value)} style={selStyle}>
            {G.PRI_STATUS.map((s) => <option key={s.id} value={s.id}>{s.label}</option>)}
          </select>
        </Field>
        <Field label="Target year">
          <select value={year} onChange={(e) => setYear(e.target.value)} style={selStyle}>
            {PRI_YEARS.map((y) => <option key={y} value={y}>{y}</option>)}
          </select>
        </Field>
        <Field label="Target quarter">
          <select value={q} onChange={(e) => setQ(e.target.value)} style={selStyle}>
            {[1, 2, 3, 4].map((n) => <option key={n} value={n}>Q{n}</option>)}
          </select>
        </Field>
      </div>
      {reassigning && (
        <div style={{ display: "flex", gap: 8, alignItems: "flex-start", padding: "9px 11px", borderRadius: 8, background: "var(--t-warn-bg)", border: "1px solid var(--t-warn-dot)" }}>
          <Icon name="building" size={14} style={{ color: "var(--t-warn-fg)", marginTop: 1, flex: "0 0 auto" }} />
          <span style={{ fontFamily: "var(--ui)", fontSize: 12, color: "var(--t-warn-fg)", lineHeight: 1.5 }}>
            Reassigning from <b>{deptById(initial.dept) ? deptById(initial.dept).name : initial.dept}</b> to <b>{deptById(dept) ? deptById(dept).name : dept}</b>.
            {losingAccess ? " Since you're signed in as a single department, you'll no longer be able to edit this item after the handoff." : ""}
          </span>
        </div>
      )}
      <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 2 }}>
        <button onClick={onCancel} style={{ border: "1px solid var(--line-strong)", background: "var(--paper)", color: "var(--muted)", borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontFamily: "var(--ui)", fontSize: 13, fontWeight: 700 }}>Cancel</button>
        <button onClick={save} disabled={!canSave} style={{ border: "none", background: canSave ? "var(--navy)" : "var(--line-strong)", color: "#fff", borderRadius: 8, padding: "8px 16px", cursor: canSave ? "pointer" : "not-allowed", fontFamily: "var(--ui)", fontSize: 13, fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 7 }}>
          <Icon name="check" size={15} />{isNew ? "Add objective" : "Save changes"}
        </button>
      </div>
    </div>
  );
}

/* ---------- Objective card ---------- */
function ObjectiveCard({ p, staff, editable, onSetStatus, onEdit, onRemove, density }) {
  const st = priStatusById(p.status);
  const compact = density === "compact";
  const [confirm, setConfirm] = React.useState(false);
  return (
    <div style={{
      background: "var(--paper)", border: "1px solid var(--line)", borderRadius: 12,
      padding: compact ? "13px 15px" : "16px 18px", display: "flex", flexDirection: "column",
      gap: compact ? 8 : 10, transition: "box-shadow .18s, border-color .18s", position: "relative",
    }}
      onMouseEnter={(e) => { e.currentTarget.style.boxShadow = "0 6px 20px rgba(16,38,24,.08)"; e.currentTarget.style.borderColor = "var(--line-strong)"; }}
      onMouseLeave={(e) => { e.currentTarget.style.boxShadow = "none"; e.currentTarget.style.borderColor = "var(--line)"; }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
        <DeptBadge id={p.dept} />
        <TargetTag target={p.target} />
      </div>
      <div style={{ fontFamily: "var(--head)", fontSize: compact ? 16 : 17.5, fontWeight: 700, color: "var(--ink)", lineHeight: 1.25, letterSpacing: "-.01em" }}>
        {p.title}
      </div>
      {!compact && (
        <div style={{ fontSize: 13.5, lineHeight: 1.5, color: "var(--muted)", textWrap: "pretty",
          display: "-webkit-box", WebkitLineClamp: 3, WebkitBoxOrient: "vertical", overflow: "hidden" }}>
          {p.desc}
        </div>
      )}
      <div style={{ marginTop: "auto", paddingTop: compact ? 2 : 4, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
        {staff && editable
          ? <StatusEditor options={G.PRI_STATUS} value={p.status} onChange={(v) => onSetStatus(p.id, v)} />
          : <StatusPill tone={st.tone} label={st.label} />}
        {staff && editable && !confirm && (
          <div style={{ display: "flex", gap: 6 }}>
            <IconBtn icon="edit" title="Edit objective" onClick={() => onEdit(p.id)} />
            <IconBtn icon="trash" title="Remove objective" tone="danger" onClick={() => setConfirm(true)} />
          </div>
        )}
        {staff && !editable && (
          <span title="Owned by another department — read-only for you" style={{ display: "inline-flex", alignItems: "center", gap: 5, fontFamily: "var(--ui)", fontSize: 11.5, fontWeight: 600, color: "var(--muted)" }}>
            <Icon name="lock" size={13} style={{ opacity: .7 }} />Read-only
          </span>
        )}
        {staff && editable && confirm && (
          <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
            <span style={{ fontFamily: "var(--ui)", fontSize: 12, fontWeight: 600, color: "#a13a2c" }}>Remove?</span>
            <button onClick={() => onRemove(p.id)} style={{ border: "none", background: "#a13a2c", color: "#fff", borderRadius: 7, padding: "5px 11px", cursor: "pointer", fontFamily: "var(--ui)", fontSize: 12, fontWeight: 700 }}>Yes</button>
            <button onClick={() => setConfirm(false)} style={{ border: "1px solid var(--line-strong)", background: "var(--paper)", color: "var(--muted)", borderRadius: 7, padding: "5px 11px", cursor: "pointer", fontFamily: "var(--ui)", fontSize: 12, fontWeight: 700 }}>No</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------- Cards-by-goal view ---------- */
function GoalSection({ goal, items, staff, canEdit, role, fullAccess, onSetStatus, onSavePriority, onAddPriority, onRemovePriority, density }) {
  const stats = goalStats(items);
  const [editingId, setEditingId] = React.useState(null);

  return (
    <section style={{ marginBottom: 34 }}>
      <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 20, marginBottom: 16, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, minWidth: 0 }}>
          <div style={{
            width: 38, height: 38, borderRadius: 10, flex: "0 0 auto",
            background: "var(--green)", color: "#fff", display: "grid", placeItems: "center",
            fontFamily: "var(--serif)", fontSize: 19, fontWeight: 700,
          }}>{goal.n}</div>
          <h3 style={{ margin: 0, fontFamily: "var(--head)", fontSize: 21, fontWeight: 700, color: "var(--ink)", letterSpacing: "-.015em", lineHeight: 1.2 }}>

        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 14, flex: "0 0 auto" }}>

          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
            <div style={{ width: 120 }}><StatusBar counts={stats.counts} total={stats.total} /></div>
            <span style={{ fontFamily: "var(--serif)", fontSize: 17, fontWeight: 700, color: "var(--green-dark)", minWidth: 42, textAlign: "right" }}>{stats.pct}%</span>
          </div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(290px, 1fr))", gap: 14 }}>

        {staff && adding && (

            onSave={(fields) => { onAddPriority(goal.id, fields); setAdding(false); }}
            onCancel={() => setAdding(false)} />

        {staff && !adding && (
          <button onClick={() => setAdding(true)} style={{

            minHeight: 120, cursor: "pointer", display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center", gap: 8, color: "var(--muted)",
            fontFamily: "var(--ui)", fontSize: 13.5, fontWeight: 700, transition: "all .15s",
          }}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor = "var(--green)"; e.currentTarget.style.color = "var(--green-dark)"; e.currentTarget.style.background = "var(--green-tint)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--line-strong)"; e.currentTarget.style.color = "var(--muted)"; e.currentTarget.style.background = "transparent"; }}>
            <Icon name="plus" size={22} />Add objective
          </button>
        )}
      </div>
    </section>
  );
}

/* ---------- Roadmap timeline (quarter matrix) ---------- */
function TimelineView({ priorities, staff, onSetStatus }) {
  const LEFT = 300, QW = 44;

                {YEARS.map((y) => [1, 2, 3, 4].map((q) => (

                    Q{q}
                  </div>
                )))}
              </div>
            </div>
          </div>
          {/* rows */}
          {byGoal.map(({ goal, items }) => (
            <div key={goal.id}>

                <span style={{ fontFamily: "var(--ui)", fontSize: 12.5, fontWeight: 700, color: "var(--green-dark)", letterSpacing: ".01em" }}>{goal.title}</span>

              {items.map((p) => {

                return (
                  <div key={p.id} style={{ display: "flex", borderBottom: "1px solid var(--line)", alignItems: "stretch" }}>

  <script type="text/babel" data-presets="react">
/* Resolution Tracker: search, filters, expandable history, staff editing. */

/* G is global */
const TODAY = "2026-05-30";

function ProgressHistory({ history }) {
  if (!history || history.length === 0) {
    return <div style={{ fontFamily: "var(--ui)", fontSize: 13, color: "var(--muted)", fontStyle: "italic" }}>No progress reports recorded yet.</div>;

    <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>

        <div key={i} style={{ display: "flex", gap: 13, paddingBottom: i === history.length - 1 ? 0 : 14 }}>

            <span style={{ width: 9, height: 9, borderRadius: 999, background: i === 0 ? "var(--green)" : "var(--line-strong)", flex: "0 0 auto" }} />
            {i !== history.length - 1 && <span style={{ width: 2, flex: 1, background: "var(--line)", marginTop: 3 }} />}
          </div>
          <div style={{ paddingBottom: 2 }}>
            <div style={{ fontFamily: "var(--ui)", fontSize: 11.5, fontWeight: 700, color: i === 0 ? "var(--green-dark)" : "var(--muted)", letterSpacing: ".02em", marginBottom: 2 }}>
              {fmtDate(h.date)}

            <div style={{ fontFamily: "var(--ui)", fontSize: 13.5, lineHeight: 1.55, color: "var(--ink)", textWrap: "pretty" }}>{h.note}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function AddUpdate({ onAdd }) {
  const [val, setVal] = React.useState("");
  const submit = () => { const v = val.trim(); if (!v) return; onAdd(v); setVal(""); };
  return (
    <div style={{ marginTop: 14, padding: 14, borderRadius: 10, background: "var(--green-tint)", border: "1px solid var(--green-line)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 9, fontFamily: "var(--ui)", fontSize: 11.5, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", color: "var(--green-dark)" }}>

      <div style={{ display: "flex", gap: 9, alignItems: "flex-end" }}>
        <textarea value={val} onChange={(e) => setVal(e.target.value)} rows={2}

          onKeyDown={(e) => { if ((e.metaKey || e.ctrlKey) && e.key === "Enter") submit(); }}
          style={{ flex: 1, resize: "vertical", border: "1px solid var(--green-line)", borderRadius: 8, padding: "9px 11px", fontFamily: "var(--ui)", fontSize: 13.5, lineHeight: 1.5, color: "var(--ink)", background: "var(--paper)", outline: "none" }} />
        <button onClick={submit} disabled={!val.trim()} style={{
          flex: "0 0 auto", border: "none", borderRadius: 8, padding: "10px 16px", cursor: val.trim() ? "pointer" : "not-allowed",
          background: val.trim() ? "var(--navy)" : "var(--line-strong)", color: "#fff", fontFamily: "var(--ui)", fontSize: 13, fontWeight: 700,
        }}>Post</button>
      </div>
    </div>
  );
}

/* ---------- New resolution editor (staff) ---------- */
function ResolutionEditor({ onSave, onCancel, defaultDept }) {
  const [num, setNum] = React.useState("");
  const [date, setDate] = React.useState(window.TODAY);
  const [dept, setDept] = React.useState(defaultDept || G.DEPARTMENTS[0].id);

  const [text, setText] = React.useState("");
  const canSave = num.trim() && text.trim();
  const save = () => { if (!canSave) return; onSave({ num: num.trim(), date, depts: [dept], status, text: text.trim() }); };
  const selStyle = { ...fieldInput, appearance: "none", cursor: "pointer", paddingRight: 30,
    background: "var(--paper) url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%235d6b73' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>\") no-repeat right 9px center" };
  return (
    <div style={{ border: "1.5px solid var(--green)", borderRadius: 14, background: "var(--paper)", padding: 18, marginBottom: 16, boxShadow: "0 8px 26px rgba(16,38,24,.1)", display: "flex", flexDirection: "column", gap: 13 }}>

        <Field label="Lead department">
          <select value={dept} onChange={(e) => setDept(e.target.value)} style={selStyle}>

        <Field label="Status">

      </div>

        <button onClick={save} disabled={!canSave} style={{ border: "none", background: canSave ? "var(--navy)" : "var(--line-strong)", color: "#fff", borderRadius: 8, padding: "9px 17px", cursor: canSave ? "pointer" : "not-allowed", fontFamily: "var(--ui)", fontSize: 13, fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 7 }}>
          <Icon name="check" size={15} />Add resolution
        </button>
      </div>
    </div>
  );
}

/* ---------- Department reassignment (staff) ---------- */
function DeptReassign({ depts, onSave }) {
  const [open, setOpen] = React.useState(false);
  const [sel, setSel] = React.useState(depts);
  React.useEffect(() => { setSel(depts); }, [depts.join(",")]);
  const toggle = (id) => setSel((s) => s.includes(id) ? s.filter((x) => x !== id) : [...s, id]);
  const dirty = sel.join(",") !== depts.join(",");
  if (!open) {
    return (
      <button onClick={(e) => { e.stopPropagation(); setOpen(true); }} title="Reassign department" style={{
        display: "inline-flex", alignItems: "center", gap: 5, border: "1px solid var(--line)", background: "var(--paper)",
        color: "var(--green-dark)", borderRadius: 8, padding: "5px 10px", cursor: "pointer", fontFamily: "var(--ui)", fontSize: 12, fontWeight: 700,
      }}>
        <Icon name="edit" size={13} />Reassign
      </button>
    );
  }
  return (
    <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", marginTop: 10, padding: 13, borderRadius: 10, background: "var(--green-tint)", border: "1px solid var(--green-line)" }}>
      <div style={{ fontFamily: "var(--ui)", fontSize: 11, fontWeight: 700, letterSpacing: ".05em", textTransform: "uppercase", color: "var(--green-dark)", marginBottom: 9 }}>
        Responsible department(s) — first is the lead
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 11 }}>
        {G.DEPARTMENTS.map((d) => {
          const active = sel.includes(d.id);
          const order = sel.indexOf(d.id);
          return (
            <button key={d.id} onClick={() => toggle(d.id)} style={{
              display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 11px", borderRadius: 999, cursor: "pointer",
              fontFamily: "var(--ui)", fontSize: 12, fontWeight: 600,
              border: active ? "1px solid var(--green)" : "1px solid var(--line)",
              background: active ? "var(--paper)" : "transparent", color: active ? "var(--green-dark)" : "var(--muted)",
            }}>
              {active && order === 0 && <span style={{ fontSize: 10, fontWeight: 800, background: "var(--green)", color: "#fff", borderRadius: 4, padding: "0 4px" }}>LEAD</span>}
              {d.name}
            </button>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
        <button onClick={() => { setSel(depts); setOpen(false); }} style={{ border: "1px solid var(--line-strong)", background: "var(--paper)", color: "var(--muted)", borderRadius: 8, padding: "6px 13px", cursor: "pointer", fontFamily: "var(--ui)", fontSize: 12.5, fontWeight: 700 }}>Cancel</button>
        <button onClick={() => { if (sel.length && dirty) onSave(sel); setOpen(false); }} disabled={!sel.length || !dirty} style={{ border: "none", background: (sel.length && dirty) ? "var(--navy)" : "var(--line-strong)", color: "#fff", borderRadius: 8, padding: "6px 14px", cursor: (sel.length && dirty) ? "pointer" : "not-allowed", fontFamily: "var(--ui)", fontSize: 12.5, fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 6 }}>
          <Icon name="check" size={14} />Save
        </button>
      </div>
    </div>
  );
}

function ResolutionRow({ r, staff, editable, fullAccess, onSetStatus, onAddUpdate, onSetDepts, onRemove, density, query }) {

                <div style={{ marginTop: 12, display: "inline-flex", alignItems: "center", gap: 6, fontFamily: "var(--ui)", fontSize: 12, fontWeight: 600, color: "var(--muted)" }}>

  const [adding, setAdding] = React.useState(false);

  const counts = React.useMemo(() => {
    const c = { all: resolutions.length, assigned: 0, active: 0, achieved: 0 };
    resolutions.forEach((r) => c[r.status]++);
    return c;
  }, [resolutions]);

  const filtered = resolutions.filter((r) => {
    if (statusF !== "all" && r.status !== statusF) return false;
    if (deptF !== "all" && !r.depts.includes(deptF)) return false;

      const q = query.toLowerCase();
      if (!(r.num.toLowerCase().includes(q) || r.text.toLowerCase().includes(q) ||

          )}
        </div>
      </div>

      {staff && adding && (
        <ResolutionEditor defaultDept={!fullAccess ? role : undefined} onSave={(fields) => { onAddResolution(fields); setAdding(false); }} onCancel={() => setAdding(false)} />
      )}

      {/* list */}

        <div style={{ padding: "10px 20px", borderBottom: "1px solid var(--line)", background: "var(--bg-sunk)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontFamily: "var(--ui)", fontSize: 12.5, fontWeight: 600, color: "var(--muted)" }}>
            {filtered.length} resolution{filtered.length === 1 ? "" : "s"}{(statusF !== "all" || deptF !== "all" || query) ? " matching" : ""} · newest first
          </span>
          <span style={{ fontFamily: "var(--ui)", fontSize: 12, color: "var(--muted)" }}>Current as of {fmtDate(G.asOf)}</span>
        </div>
        {filtered.length === 0

          : filtered.map((r) => (

      </div>
    </div>
  );
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

          ? <PrioritiesView priorities={priorities} staff={staff} canEdit={canEdit} role={role} fullAccess={fullAccess} onSetStatus={setPriStatus}
              onSavePriority={savePriority} onAddPriority={addPriority} onRemovePriority={removePriority} density={t.density} />
          : <ResolutionsView resolutions={resolutions} staff={staff} canEdit={canEdit} role={role} fullAccess={fullAccess} onSetStatus={setResStatus} onAddUpdate={addUpdate}
              onSetDepts={setResDepts} onAddResolution={addResolution} onRemoveResolution={removeResolution} density={t.density} />}
      </main>

      {/* footer */}
      <footer style={{ borderTop: "1px solid var(--line)", background: "var(--paper)" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: "26px 28px", display: "flex", justifyContent: "space-between", gap: 20, flexWrap: "wrap", alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <GoldenMark height={42} />
            <div style={{ fontFamily: "var(--ui)", fontSize: 12.5, color: "var(--muted)", lineHeight: 1.5 }}>
              Town of Golden · 810 9th Avenue South, Box 350, Golden, BC<br />
              Resolution data current as of {fmtDate(G.asOf)} · Priorities reviewed quarterly.
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 18 }}>
            <span style={{ fontFamily: "var(--ui)", fontSize: 12, color: "var(--muted)" }}>A public accountability tool of the Town of Golden.</span>
            {!staff && (
              <button onClick={() => { if (authed) { setStaff(true); } else { setLoginOpen(true); } }} style={{
                display: "inline-flex", alignItems: "center", gap: 6, border: "1px solid var(--line)", background: "var(--paper)",
                color: "var(--muted)", cursor: "pointer", fontFamily: "var(--ui)", fontSize: 12.5, fontWeight: 700,
                padding: "7px 13px", borderRadius: 8, transition: "all .15s",
              }}
                onMouseEnter={(e) => { e.currentTarget.style.borderColor = "var(--green)"; e.currentTarget.style.color = "var(--green-dark)"; }}
                onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--line)"; e.currentTarget.style.color = "var(--muted)"; }}>
                <Icon name="lock" size={14} />Staff sign in
              </button>
            )}
          </div>
        </div>
      </footer>

      {/* Tweaks */}
      <TweaksPanel>
        <TweakSection label="Density" />
        <TweakRadio label="Layout" value={t.density} options={["comfortable", "compact"]} onChange={(v) => setTweak("density", v)} />
        <TweakSection label="Brand" />
        <TweakColor label="Accent" value={t.accent === "green" ? "#12651f" : t.accent === "river" ? "#1b4d7a" : "#41607a"}
          options={["#12651f", "#1b4d7a", "#41607a"]}
          onChange={(hex) => setTweak("accent", hex === "#1b4d7a" ? "river" : hex === "#41607a" ? "slate" : "green")} />
        <TweakRadio label="Headings" value={t.headings} options={["serif", "sans"]} onChange={(v) => setTweak("headings", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
